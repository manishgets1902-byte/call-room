<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- यहाँ नाम बदलकर Echo कर दिया गया है -->
    <title>Echo</title>
    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Dark and Cinematic Look */
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        h1 { color: #00d2ff; margin-bottom: 5px; font-weight: normal; letter-spacing: 2px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; font-size: 18px; outline: none; text-align: center; letter-spacing: 2px;}
        button.call-btn { background: #00d2ff; color: #000; font-weight: bold; padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        button.call-btn:hover { background: #00a8cc; }
        .my-id-text { font-size: 16px; color: #aaa; margin-bottom: 10px; }
        .id-badge { background: #333; padding: 10px 20px; border-radius: 8px; color: #00d2ff; font-weight: bold; font-size: 28px; letter-spacing: 4px; display: inline-block; margin-top: 10px;}

        /* Video Screen */
        #video-screen { display: none; position: relative; width: 100vw; height: 100vh; background: #000; }
        
        /* Remote Video (Full Screen) */
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Local Video (PiP mode) */
        #local-video { position: absolute; bottom: 110px; right: 20px; width: 110px; height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; background: #222; transform: scaleX(-1); }

        /* Control Buttons */
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; background: rgba(0, 0, 0, 0.6); padding: 12px 25px; border-radius: 30px; backdrop-filter: blur(10px); }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #444; color: white; transition: 0.3s; }
        .control-btn:active { transform: scale(0.9); }
        .btn-off { background: #ff4757 !important; color: white; }
        .btn-end { background: #ff4757; color: white; }
        .btn-end:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <!-- Screen 1: Login/Connect -->
    <div id="login-screen">
        <div class="box">
            <!-- यहाँ भी नाम बदलकर Echo कर दिया गया है -->
            <h1>Echo</h1>
            <p class="my-id-text">Your ID:</p>
            <span id="my-id" class="id-badge">...</span>
            <input type="text" id="partner-id" placeholder="Enter 6-Digit ID" maxlength="6">
            <button class="call-btn" onclick="callPartner()">Connect</button>
        </div>
    </div>

    <!-- Screen 2: Video Call & Controls -->
    <div id="video-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        
        <div id="controls">
            <button class="control-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="control-btn" id="cam-btn" onclick="toggleVideo()">📹</button>
            <button class="control-btn" id="switch-btn" onclick="switchCamera()">🔄</button>
            <button class="control-btn btn-end" onclick="endCall()">❌</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let currentCall;
        let isMicOn = true;
        let isVideoOn = true;
        let currentFacingMode = "user";

        const generateShortId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const myCustomId = generateShortId();

        peer = new Peer(myCustomId, {
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]}
        });

        peer.on('open', (id) => {
            document.getElementById("my-id").innerText = id;
        });

        peer.on('call', async (call) => {
            currentCall = call;
            await setupLocalStream();
            call.answer(localStream);
            showVideoScreen();

            call.on('stream', (remoteStream) => {
                document.getElementById("remote-video").srcObject = remoteStream;
            });
        });

        async function callPartner() {
            const partnerId = document.getElementById("partner-id").value;
            if (!partnerId) {
                alert("Please enter a valid 6-Digit ID!");
                return;
            }
            await setupLocalStream();
            currentCall = peer.call(partnerId, localStream);
            showVideoScreen();

            currentCall.on('stream', (remoteStream) => {
                document.getElementById("remote-video").srcObject = remoteStream;
            });
        }

        async function setupLocalStream() {
            if (localStream) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: true
                });
                document.getElementById("local-video").srcObject = localStream;
            } catch (err) {
                alert("Camera or Microphone permission denied!");
                console.error(err);
            }
        }

        function showVideoScreen() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("video-screen").style.display = "block";
        }

        function toggleMic() {
            if (!localStream) return;
            isMicOn = !isMicOn;
            localStream.getAudioTracks()[0].enabled = isMicOn;
            const micBtn = document.getElementById("mic-btn");
            if(isMicOn) {
                micBtn.innerText = "🎤";
                micBtn.classList.remove("btn-off");
            } else {
                micBtn.innerText = "🔇";
                micBtn.classList.add("btn-off");
            }
        }

        function toggleVideo() {
            if (!localStream) return;
            isVideoOn = !isVideoOn;
            localStream.getVideoTracks()[0].enabled = isVideoOn;
            const camBtn = document.getElementById("cam-btn");
            if(isVideoOn) {
                camBtn.innerText = "📹";
                camBtn.classList.remove("btn-off");
            } else {
                camBtn.innerText = "🚫";
                camBtn.classList.add("btn-off");
            }
        }

        async function switchCamera() {
            if (!localStream) return;
            
            const oldVideoTrack = localStream.getVideoTracks()[0];
            oldVideoTrack.stop();

            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";

            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode },
                audio: false
            });

            const newVideoTrack = newStream.getVideoTracks()[0];
            
            localStream.removeTrack(oldVideoTrack);
            localStream.addTrack(newVideoTrack);
            document.getElementById("local-video").srcObject = localStream;

            if (currentCall && currentCall.peerConnection) {
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === "video");
                if (sender) {
                    sender.replaceTrack(newVideoTrack);
                }
            }
            
            if(currentFacingMode === "environment") {
                 document.getElementById("local-video").style.transform = "scaleX(1)";
            } else {
                 document.getElementById("local-video").style.transform = "scaleX(-1)";
            }
        }

        function endCall() {
            if (currentCall) {
                currentCall.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            window.location.reload();
        }
    </script>
</body>
</html>
